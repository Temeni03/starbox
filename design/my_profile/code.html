<style>
        body {
            background-color: #f4fafd; /* background token */
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-body-md text-on-background selection:bg-primary-container">
<!-- Top AppBar (JSON Mapping) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md shadow-sm">
<div class="flex items-center justify-between px-margin-mobile h-touch-target-min w-full">
<button class="active:scale-95 transition-transform hover:bg-primary-container/20 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-headline-xl text-headline-xl text-primary dark:text-primary-fixed-dim tracking-tight">Starbox</h1>
<button class="active:scale-95 transition-transform hover:bg-primary-container/20 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">search</span>
</button>
</div>
</header>
<main class="pt-20 pb-24 px-margin-mobile max-w-md mx-auto">
<!-- Profile Hero Section -->
<section class="mb-10 text-center">
<div class="relative inline-block mb-4">
<div class="w-24 h-24 rounded-full border-4 border-primary-container overflow-hidden mx-auto shadow-lg">
<img class="w-full h-full object-cover" data-alt="A professional studio portrait of a sophisticated young person with a friendly expression, set against a soft lavender and airy pink gradient background. The lighting is soft and flattering, emphasizing a clean and curated high-end aesthetic that matches a luxury e-commerce brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXkEQIMjyQVMi6zYaD_KPD0438vE3o285Ed9E9Nw3X1XOrFvAruO17csvu18px6WAdju7JaFhbvNj3N60ValPuDgGL0nw44rnfAZubOTuX2XyKacHc9t7Na3GuhBx5uMF2C-5ouQ4MLiDFJLtEnpdwJap5r8_aaO4zecDv9iYxnxZc355XP_yRMpc1dw4fbsvuHVpFtrp-4yWHN6GBNse-BXprlcubuqATeYIWrDbhhVsRy_ljb3HaKYqhldty3g6S-ZOcC1uzXNA"/>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-on-primary p-1.5 rounded-full shadow-md border-2 border-surface">
<span class="material-symbols-outlined text-[18px]">edit</span>
</div>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Alex Thompson</h2>
<p class="font-body-md text-on-surface-variant">+1 (555) 234-8890</p>
</section>
<!-- Primary Address Bento Card -->
<section class="mb-8">
<div class="bg-surface-container-low rounded-xl p-4 shadow-sm border border-outline-variant/30 flex items-start gap-4">
<div class="bg-primary-container/30 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex-1">
<p class="font-label-sm text-primary mb-1 uppercase tracking-wider">Primary Delivery</p>
<p class="font-body-lg text-on-surface font-semibold leading-tight">122 High Street, Penthouse 4</p>
<p class="font-body-md text-on-surface-variant">London, W1S 1RE, United Kingdom</p>
</div>
<button class="text-primary font-label-lg self-center">Change</button>
</div>
</section>
<!-- Navigation List -->
<section class="space-y-4 mb-8">
<!-- My Orders -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center justify-between shadow-sm active:scale-[0.98] transition-all hover:bg-primary-container/10">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">receipt_long</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">My Orders</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Saved Addresses -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center justify-between shadow-sm active:scale-[0.98] transition-all hover:bg-primary-container/10">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">bookmarks</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Saved Addresses</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Payment Methods -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center justify-between shadow-sm active:scale-[0.98] transition-all hover:bg-primary-container/10">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">credit_card</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Payment Methods</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Support -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center justify-between shadow-sm active:scale-[0.98] transition-all hover:bg-primary-container/10">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">support_agent</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Support</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</section>
<!-- Logout Button -->
<section class="mt-12 px-4">
<button class="w-full h-12 flex items-center justify-center gap-2 border-2 border-error/20 text-error rounded-full font-label-lg active:bg-error/5 transition-colors">
<span class="material-symbols-outlined">logout</span>
                Logout
            </button>
<p class="text-center text-on-surface-variant/40 font-label-sm mt-6">Starbox Version 2.4.0 (Gold)</p>
</section>
</main>
<!-- Bottom Navigation Bar (JSON Mapping) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md shadow-lg">
<div class="flex justify-around items-center h-16 w-full px-2 pb-safe">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-sm text-label-sm">Cart</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-sm text-label-sm">Orders</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 hover:opacity-80 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</div>
</nav>
<script>
        // Simple Micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-70');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-70');
            });
        });
    </script>
</body></html>
